<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resultados - Calculadora Ríos Solares</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f5f7fb;
}

.card-box {
  background: white;
  padding: 3%;
  border-radius: 12px;
  margin-bottom: 20px;
}

h1 {
  font-size: clamp(1.5rem, 2.5vw, 2.2rem);
}

.result-highlight {
  font-weight: bold;
  color: #0d6efd;
}

.text-danger-custom {
  color: #d9534f; /* softer red */
}

.text-success-custom {
  color: #2e8b57; /* softer green */
}

</style>
</head>

<body>

<div class="container-fluid px-3 px-md-5 py-4">

<div class="card-box text-center">
  <h1>Resultados</h1>

  <p id="mainText" class="mt-3"></p>
</div>

<div class="text-center">
  <button onclick="goBack()" class="btn btn-outline-primary">← Volver</button>
</div>

</div>

<div class="card-box mt-4">
  <h2 class="mb-3">Comparación</h2>

  <div class="table-responsive">
    <table class="table align-middle text-center">

      <thead>
        <tr>
          <th></th>
          <th class="text-danger-custom">Hoy (gasolina)</th>
          <th class="text-success-custom">Con bote solar</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td><strong>Costo mensual</strong></td>
          <td id="gas_month"></td>
          <td id="solar_month"></td>
        </tr>

        <tr>
          <td><strong>Costo a 10 años</strong></td>
          <td id="gas_10y"></td>
          <td id="solar_10y"></td>
        </tr>

        <tr>
          <td><strong>Ahorro total en 10 años</strong></td>
          <td>-</td>
          <td id="savings_10y"></td>
        </tr>

      </tbody>
    </table>
  </div>
</div>

<script>

// GET PARAMS
const url = new URLSearchParams(window.location.search);

const km = parseFloat(url.get("km")) || 0;
const gas_price = parseFloat(url.get("gas_price")) || 0;
const km_per_gallon = parseFloat(url.get("km_per_gallon")) || 14;
const maintenance = parseFloat(url.get("maintenance")) || 300;
const engine_cost = parseFloat(url.get("engine_cost")) || 900;

const pago = parseFloat(url.get("pago")) || 0;
const panel = parseInt(url.get("panel")) || 0;
const battery = parseInt(url.get("battery")) || 0;
const subsidy = parseFloat(url.get("subsidy")) || 0;
const nper = parseFloat(url.get("nper")) || 0;

// COSTS
const base = 6000;
const panelCost = panel ? 1500 : 0;
const batteryCost = battery ? 2500 : 0;

// 1️⃣ Monthly gasoline cost
const monthly_gas =
  (30/7) * ((km * gas_price) / km_per_gallon);

// 2️⃣ Solar monthly payment
const monthly_solar = pago;

// 3️⃣ Difference
const diff = monthly_gas - monthly_solar;

// TEXT LOGIC
let ahorroTexto = "";
if (diff > 0) {
  ahorroTexto = `ahorrando $${Math.round(diff)} cada mes`;
} else {
  ahorroTexto = `gastando adicional $${Math.round(Math.abs(diff))} cada mes`;
}

// 4️⃣ Years
const years = (nper / 12).toFixed(1);

// 5️⃣ 10-year savings
const tenYearSavings =
  (10 * (
    (365/7) * ((km * gas_price) / km_per_gallon) + maintenance
  ))
  - (base + panelCost + batteryCost - subsidy)
  - engine_cost;

// FINAL TEXT
document.getElementById("mainText").innerHTML = `
  Con los datos ingresados, se estima que cambiar a un bote solar permitiría pasar de gastar 
  <span class="result-highlight">$${Math.round(monthly_gas)}</span> al mes en gasolina 
  a pagar <span class="result-highlight">$${monthly_solar}</span> al mes por el bote solar — 
  <span class="result-highlight">${ahorroTexto}</span>.<br><br>

  El bote estaría pagado en <span class="result-highlight">${years}</span> años, 
  y en 10 años el ahorro total sería de 
  <span class="result-highlight">$${Math.round(tenYearSavings)}</span>.
`;

// --- TABLE CALCULATIONS ---

// Monthly
const gas_month = monthly_gas;
const solar_month = monthly_solar;

// 10-year gasoline cost
const gas_10y =
  (10 * (
    (365/7) * ((km * gas_price) / km_per_gallon) + maintenance
  )) + engine_cost;

// 10-year solar cost
const solar_10y =
  10 * monthly_solar;

// Savings (already computed but reuse cleanly)
const savings_10y_table =
  gas_10y - (base + panelCost + batteryCost - subsidy) - engine_cost;


// --- RENDER TABLE ---

document.getElementById("gas_month").innerText = `$${Math.round(gas_month)}`;
document.getElementById("solar_month").innerText = `$${Math.round(solar_month)}`;

document.getElementById("gas_10y").innerText = `$${Math.round(gas_10y)}`;
document.getElementById("solar_10y").innerText = `$${Math.round(solar_10y)}`;

document.getElementById("savings_10y").innerText = `$${Math.round(savings_10y_table)}`;

function goBack() {
  window.history.back();
}

</script>

</body>
</html>
